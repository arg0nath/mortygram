name: mortygram
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.10.8


dependencies:
  flutter:
    sdk: flutter
  
  bloc: ^9.0.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  shared_preferences: ^2.5.3
  flutter_animate: ^4.5.0
  lottie: ^3.1.3
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.14
  carousel_slider: ^5.0.0
  toastification: ^3.0.3
  flutter_launcher_icons: ^0.14.1
  percent_indicator: ^4.2.3
  url_launcher: ^6.3.2
  internet_connection_checker_plus: ^2.5.2
  path: ^1.9.0
  cached_network_svg_image: ^1.2.0
  animations: ^2.0.11
  iconsax_flutter: ^1.0.0
  get_it: ^8.0.3
  go_router: ^16.0.0
  dartz: ^0.10.1
  intl: ^0.20.2
  json_annotation: ^4.10.0
  freezed: ^3.1.0
  freezed_annotation: ^3.1.0
  http: ^1.4.0
  retry: ^3.1.2
  bloc_concurrency: ^0.3.0
  smooth_page_indicator: ^1.2.1
  audioplayers: ^6.5.0
  fluentui_system_icons: ^1.1.273 
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  json_serializable: ^6.11.4
  flutter_dotenv: ^6.0.0
  flex_color_scheme: ^8.4.0
  drift: ^2.30.1
  path_provider: ^2.1.5
  drift_flutter: ^0.2.8
  # workmanager: ^0.9.0+3
  share_plus: ^12.0.1
  very_good_analysis: ^10.1.0
  stream_transform: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  bloc_lint: ^0.3.6
  build_runner: ^2.10.5
  drift_dev: ^2.30.1
  

flutter:

  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/
    - assets/svgs/
    - assets/lotties/
    - assets/icon/

  fonts:
    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand-Regular.ttf
        - asset: assets/fonts/Quicksand-Bold.ttf
          weight: 700  




flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
